<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abyssus Web App - Dark Fantasy Quiz</title>

  <!-- Google Fonts : Cinzel & Rajdhani -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Aura Néon en Arrière-plan -->
  <div class="ambient-glow"></div>

  <!-- Écran de Cooldown (PV = 0) -->
  <div id="cooldown-screen" class="overlay hidden">
    <div class="cooldown-card">
      <h2>💀 PV ÉPUISÉS</h2>
      <p>Vous avez été terrassé dans l'Abysse. Régénération en cours :</p>
      <div id="cooldown-timer" class="cooldown-clock">00:00:00</div>
      <p class="small-info">Patientez avant de pouvoir défier à nouveau les ténèbres.</p>
    </div>
  </div>

  <!-- Conteneur Principal du Quiz -->
  <div class="abyssus-quiz-container">
    
    <!-- Barre de Statistiques Joueur (PV, Rang, XP) -->
    <div class="player-stats-bar">
      <!-- PV -->
      <div class="stat-box">
        <span class="stat-label">Points de Vie</span>
        <div class="bar-container pv-bar-container">
          <div id="pv-fill" class="bar-fill pv-fill" style="width: 100%;"></div>
        </div>
        <span id="pv-text" class="stat-value">100 / 100</span>
      </div>

      <!-- Rang & XP -->
      <div class="stat-box">
        <span class="stat-label">Rang : <strong id="rank-badge" class="rank-tag">F</strong></span>
        <div class="bar-container xp-bar-container">
          <div id="xp-fill" class="bar-fill xp-fill" style="width: 0%;"></div>
        </div>
        <span id="xp-text" class="stat-value">0 / 5000 XP</span>
      </div>
    </div>

    <!-- En-tête de la Question & Chrono -->
    <div class="quiz-header">
      <span id="question-number">QUESTION 1 / 5</span>
      <span id="timer-badge" class="badge timer">⏱️ 5s</span>
      <span id="difficulty-badge" class="badge">MOYEN</span>
    </div>

    <div class="progress-bar">
      <div id="progress-fill" class="progress-fill"></div>
    </div>

    <!-- Carte de Question unique -->
    <div id="quiz-card" class="quiz-card">
      <h3 id="question-text">Chargement de la question...</h3>
      
      <div id="options-container" class="options-grid"></div>

      <!-- Boîte d'explication -->
      <div id="explanation-box" class="explanation-box hidden">
        <h4>💡 Explication :</h4>
        <p id="explanation-text"></p>
      </div>
    </div>

    <!-- Actions -->
    <div class="quiz-footer">
      <button id="next-btn" class="btn-primary" disabled>Question Suivante →</button>
    </div>

  </div>

  <!-- Intégration du script nommé script.js -->
  <script src="script.js"></script>
</body>
</html>
