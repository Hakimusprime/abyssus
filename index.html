<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssus Banque - Quiz & Classement</title>
    <link rel="stylesheet" href="style.css">

    <!-- Firebase SDKs (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <main class="app-container">
        <!-- Section Quiz -->
        <section class="quiz-container">
            <h1>Abyssus Quiz</h1>
            <button id="start-btn" onclick="startNewGame()">Lancer une partie</button>

            <div id="quiz-box" style="display: none;">
                <div id="quiz-progress" class="progress-bar">Question 1 / 10</div>
                <h2 id="question-text">Chargement de la question...</h2>
                <div id="options-container" class="options-grid"></div>
            </div>
        </section>

        <!-- Section Classement -->
        <section class="leaderboard-container">
            <h2>Classement Général (Temps Réel)</h2>
            <div id="leaderboard-list">
                <!-- Les participants s'afficheront ici -->
            </div>
        </section>
    </main>

    <!-- Fichiers JS -->
    <script src="quiz_questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
